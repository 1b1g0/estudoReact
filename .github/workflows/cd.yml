name: CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  deliver:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: entregas/somativa1-login-validacao
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: entregas/somativa1-login-validacao/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: entregas/somativa1-login-validacao/dist
